schema_version: "1.0.0"
classes:
  - id: "A"
    label: "raw-credential"
    description: "Raw long-lived credentials, signing keys, refresh tokens, or equivalent material."
    raw_model_visibility: "forbidden"
    memory_persistence: "forbidden"
    trace_redaction: "required"
  - id: "B"
    label: "runtime-secret"
    description: "Runtime environment secrets, service tokens, authorization headers, DSNs with embedded credentials, or similar."
    raw_model_visibility: "forbidden"
    memory_persistence: "forbidden"
    trace_redaction: "required"
    revocation_rotation_posture: "required-when-exposed-recoverable-or-outside-approved-boundary"
  - id: "C"
    label: "derived-sensitive"
    description: "Partially masked or derived material that still enables correlation or escalation."
    raw_model_visibility: "forbidden"
    memory_persistence: "forbidden"
    trace_redaction: "required"
    revocation_rotation_posture: "inherit-class-b-when-live-access-attributable-or-uncertain"
    live_access_attribution_signals:
      - "active_credentials"
      - "account_access"
      - "session_recoverability"
      - "live_provider_access"
    live_access_uncertainty: "fail-closed"
  - id: "P"
    label: "public-reference"
    description: "Public or non-secret reference material that may coexist with secret-bearing systems."
    raw_model_visibility: "allowed"
    memory_persistence: "allowed"
    trace_redaction: "optional"
eval_fixture_secret_policy:
  allowed_value_classes:
    - "redacted"
    - "synthetic_placeholder"
  synthetic_prefixes:
    - "SYNTH_SECRET_"
    - "SAFE_TEST_SECRET_"
  synthetic_allowed_paths:
    - "evals/fixtures/"
  synthetic_outside_allowed_paths: "forbidden"
provider_switch_reminimization:
  allowed_artifact_classes:
    - "redacted_summary"
    - "contract_bounded_outcome_summary"
  forbidden_artifact_classes:
    - "raw_request_payload"
    - "raw_response_payload"
    - "verbose_json_blob"
    - "technical_trace"
    - "full_context_replay_artifact"
    - "provider_specific_diagnostic_payload"
  unknown_artifact_class: "forbidden"
