<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Responsive Stress Fixture</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; }
    main { max-width: 80rem; margin: 0 auto; padding: 1rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(12rem, 1fr)); gap: 0.75rem; }
    .cell { border: 1px solid #b5b5b5; border-radius: 0.5rem; padding: 0.75rem; }
  </style>
</head>
<body>
  <header><h1>Responsive Stress</h1></header>
  <main>
    <section>
      <h2>Card Matrix</h2>
      <div class="grid">
        <article class="cell"><h3>One</h3><p>Short summary.</p></article>
        <article class="cell"><h3>Two</h3><p>Short summary.</p></article>
        <article class="cell"><h3>Three</h3><p>Short summary.</p></article>
        <article class="cell"><h3>Four</h3><p>Short summary.</p></article>
        <article class="cell"><h3>Five</h3><p>Short summary.</p></article>
        <article class="cell"><h3>Six</h3><p>Short summary.</p></article>
      </div>
    </section>
  </main>
</body>
</html>
